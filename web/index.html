<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tightpack</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="bevy_canvas"></canvas>
    <script type="module">
        import init from './tightpack.js';
        init().catch(console.error);
    </script>
</body>
</html>
